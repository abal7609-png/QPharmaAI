name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Unzip project
        run: |
          unzip -o QPharmaAI_Project-1.zip -d extracted_project

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # في حال كان المشروع Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
        continue-on-error: true

      - name: Build APK (Flutter)
        run: |
          cd extracted_project
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
            flutter build apk --release
          fi
        continue-on-error: true

      # في حال كان المشروع Android (Gradle) عادي
      - name: Build APK (Gradle)
        run: |
          cd extracted_project
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          fi
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: extracted_project/**/build/app/outputs/flutter-apk/*.apk
