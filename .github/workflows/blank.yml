name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project automatically
        run: |
          mkdir -p extracted_project
          # البحث عن أي ملف مضغوط وفك ضغطه تلقائياً
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Found zip file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted_project

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build Flutter APK
        run: |
          # البحث عن المجلد الذي يحتوي على pubspec.yaml والتنقل إليه
          PROJECT_DIR=$(find extracted_project -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: extracted_project/**/*.apk

      
